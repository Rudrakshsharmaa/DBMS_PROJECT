<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f8;
            text-align: center;
        }

        h2 {
            color: #333;
        }

        input, select {
            padding: 8px;
            margin: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            margin: 10px auto;
            padding: 10px;
            width: 300px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .food { border-left: 5px solid orange; }
        .travel { border-left: 5px solid blue; }
        .shopping { border-left: 5px solid purple; }
        .other { border-left: 5px solid gray; }

    </style>
</head>
<body>

<h2>💸 Expense Tracker</h2>

<input type="number" id="amount" placeholder="Amount">

<select id="category">
    <option value="food">🍔 Food</option>
    <option value="travel">🚗 Travel</option>
    <option value="shopping">🛒 Shopping</option>
    <option value="other">📦 Other</option>
</select>

<input type="date" id="date">

<button onclick="addExpense()">Add Expense</button>

<h3>Total: ₹<span id="total">0</span></h3>

<ul id="list"></ul>

<script src="script.js"></script>

</body>
</html>
